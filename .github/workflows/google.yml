name: 'Build and Run Docker on GitHub Runner'

on:
  push:
    branches: [main]

jobs:
  build-run-local:
    name: 'Build and Run Docker Locally'
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'

    steps:
      - name: 'Checkout Repository'
        uses: 'actions/checkout@v4'

      - name: 'Install Docker'
        run: |
          # Update the package list and install dependencies
          sudo apt-get update -y
          sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common lsb-release
          
          # Install Docker by using Docker's official install script
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh
          sudo systemctl start docker
          sudo systemctl enable docker
          
          # Verify Docker installation
          sudo docker --version

      - name: 'Build Docker Image'
        run: |
          docker build -t my-app-local .

      - name: 'Run Docker Container Locally'
        run: |
          docker run -d -p 8000:8000 my-app-local

      - name: 'Verify Application is Running'
        run: |
          sleep 10  # Wait for a few seconds to ensure the app is running
          curl http://localhost:8000  # Change this URL based on your app's endpoint

      - name: 'Clean up Docker'
        run: |
          docker stop $(docker ps -q)
          docker rm $(docker ps -a -q)
